<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Formulário</title>
    <script src="script.js"></script>
</head>

<body style="background-color: black; color:white">
    <h1>Cadastro de Aluno</h1>
    <form id="form-cadastro" onsubmit="cadastrar(event)">
        <label for="nome">Nome</label>
        <input id="nome" placeholder="Ex: João da Silva" required>
        <br><br>
        <label for="email">Email</label>
        <input id="email" placeholder="Ex: name@mail.com">
        <br><br>
        <label for="cpf">CPF</label>
        <input id="cpf" placeholder="000.000.000-00">
        <br><br>
        <label for="curso">Curso</label>
        <input id="curso" placeholder="Ex: Técnico em Informática">
        <br><br>
        <label for="dtNascimento">Data de Nascimento</label>
        <input id="dtNascimento" placeholder="Ex: 10/12/2001">
        <br><br>
        <label for="genero">Gênero</label>
        <input id="genero" placeholder="Ex: Masculino">
        <br><br>
        <button type="submit" id="btn-cadastrar">Cadastrar</button>
    </form>
</body>

</html>
